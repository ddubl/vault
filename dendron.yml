version: 3
useFMTitle: true
useNoteTitleForLink: true
noLegacyNoteRef: true
mermaid: true
useKatex: true
usePrettyRefs: true
dev:
    enablePreviewV2: true
site:
    copyAssets: true
    siteHierarchies:
        - root
        - todo
    siteRootDir: dwl
    usePrettyRefs: true
    title: dwlish brainspace
    description: knowledge graphs and edges
    siteLastModified: true
    gh_edit_branch: main
    duplicateNoteBehavior:
        action: useVault
        payload:
            - todo
            - journal
            - types
    siteNotesDir: ~/dendron
    assetsPrefix: asset
commands:
    lookup:
        note:
            selectionMode: extract
            confirmVaultOnCreate: true
            leaveTrace: true
    randomNote: {}
    insertNote:
        initialValue: templates
    insertNoteLink:
        aliasMode: none
        enableMultiSelect: false
    insertNoteIndex:
        enableMarker: true
workspace:
    dendronVersion: 0.65.0
    vaults:
        -
            fsPath: vault
            name: dwl
            remote:
                type: git
                url: 'git@github.com:danwalterlink/vault.git#master'
        -
            fsPath: types
            name: types
            remote:
                type: git
                url: 'git@github.com:danwalterlink/vault.git#types'
        -
            fsPath: todo
            name: todo
            remote:
                type: git
                url: 'git@github.com:danwalterlink/vault.git#todo'
        -
            fsPath: journal
            name: journal
            remote:
                type: git
                url: 'git@github.com:danwalterlink/vault.git#journal'
    journal:
        dailyDomain: daily
        name: journal
        dateFormat: y.MM.dd
        addBehavior: childOfDomain
    todos:
        name: todo
        dateFormat: y.MM.dd
        addBehaviour: childOfDomain
    scratch:
        name: scratch
        dateFormat: y.MM.dd.HHmmss
        addBehavior: asOwnDomain
    graph:
        zoomSpeed: 1
    enableAutoCreateOnDefinition: false
    enableXVaultWikiLink: false
    enableRemoteVaultInit: true
    workspaceVaultSyncMode: noCommit
    enableAutoFoldFrontmatter: true
    maxPreviewsCached: 10
    maxNoteLength: 204800
    enableUserTags: true
    enableHashTags: true
    workspaces:
        dwl:
            remote:
                type: git
                url: 'git@github.com:danwalterlink/vault.git'
