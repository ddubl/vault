version: 1
imports: []
schemas:
  - id: root
    children:
      [ journal
      ]
    title: root
    parent: root
  - id: journal
    desc: "journaling supertype. overarching themes and metajournaling"
    children:
      [ entry
      , daily
      , monthly
      , meditation
      , lsd
      , dream
      ]
  - id: entry
    desc: "journal entry; generated from event or general"
    children:
      [ event
      , idea
      ]
    pattern: {event}
  - id: daily
    desc: "daily journaling. TODO: add appointments & listings throughout the day"
    pattern: []
    template: template.daily.md
  - id: monthly
    desc: "learnings of the month, review dailies"
    pattern: monthly.[yymm]
